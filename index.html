<!DOCTYPE html>
<html>
<head>
    <title>Biodata Saya</title>

<style>
body {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    transition: 0.3s;
}

/* efek saat disentuh */
.card:hover {
    transform: scale(1.05);
}

img {
    border-radius: 50%;
    border: 4px solid #4facfe;
    margin-bottom: 10px;
}

h1 {
    color: #333;
}

h2 {
    margin-bottom: 5px;
}

p {
    margin-top: 0;
    color: #555;
}
.card {
    animation: muncul 1s ease;
}@keyframes muncul {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
/* tombol keren */
button {
    background: linear-gradient(to right, #4facfe, #00f2fe);
    color: white;
    border: none;
    padding: 10px;
    border-radius: 20px;
    margin-top: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}
</style>
  
    
    </style>

</head>
<body>

        <h2>Hobi:</h2>

    </div>
